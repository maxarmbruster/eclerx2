/* ==========================================================================
   Talkpush Design System — Colors & Type
   --------------------------------------------------------------------------
   Source of truth for palette + typography tokens.
   Brand color inventory and type system extracted from the Talkpush Brand
   Figma (Full Logo, Colors, Fonts, Web Design, Slides, UI Proposal).
   ========================================================================== */

/* ---------- FONTS ---------- */

/* Polymath Display + Polymath Text are the brand's custom typefaces.
   We don't have the licensed font files in this workspace, so we load
   the closest Google Font equivalents and the user should replace these
   @font-face declarations once they share the real .woff2 files.

   Substitutions (FLAGGED — request original files from brand team):
   - Polymath Display   → Instrument Serif (geometric, slight contrast display)
                           fallback candidate: "DM Serif Display"
   - Polymath Text      → Fraunces (warm humanist w/ a little character)
                           NOTE: Polymath Text has more of a neo-grotesque
                           feel than Fraunces. An alternative closer match
                           is "Bricolage Grotesque" which ships the same
                           optical tone in small sizes. We load Bricolage
                           Grotesque as the Polymath Text stand-in.
   - Space Grotesk      → Space Grotesk (exact match, available on Google)
*/
/* Bricolage Grotesque was a stand-in for Polymath Text — now retired. */

/* Polymath Display — real brand file (Medium only so far) */
@font-face {
  font-family: 'Polymath Display';
  src: url('../fonts/PolymathDisp-Medium.otf') format('opentype');
  font-weight: 500 700;
  font-style: normal;
  font-display: swap;
}

/* Polymath Text — real brand files (Medium + Bold) */
@font-face {
  font-family: 'Polymath Text';
  src: url('../fonts/PolymathText-Medium.woff2') format('woff2'),
       url('../fonts/PolymathText-Medium.woff') format('woff');
  font-weight: 400 600;
  font-style: normal;
  font-display: swap;
}
@font-face {
  font-family: 'Polymath Text';
  src: url('../fonts/PolymathText-Bold.woff2') format('woff2'),
       url('../fonts/PolymathText-Bold.woff') format('woff');
  font-weight: 700 900;
  font-style: normal;
  font-display: swap;
}

/* Space Grotesk — the real brand file, shipped in /fonts */
@font-face {
  font-family: 'Space Grotesk';
  src: url('../fonts/SpaceGrotesk-VariableFont_wght.ttf') format('truetype-variations'),
       url('../fonts/SpaceGrotesk-Regular.ttf') format('truetype');
  font-weight: 300 700;
  font-style: normal;
  font-display: swap;
}
@font-face {
  font-family: 'Space Grotesk';
  src: url('../fonts/SpaceGrotesk-Light.ttf') format('truetype');
  font-weight: 300;
  font-style: normal;
  font-display: swap;
}
@font-face {
  font-family: 'Space Grotesk';
  src: url('../fonts/SpaceGrotesk-Regular.ttf') format('truetype');
  font-weight: 400;
  font-style: normal;
  font-display: swap;
}
@font-face {
  font-family: 'Space Grotesk';
  src: url('../fonts/SpaceGrotesk-Medium.ttf') format('truetype');
  font-weight: 500;
  font-style: normal;
  font-display: swap;
}
@font-face {
  font-family: 'Space Grotesk';
  src: url('../fonts/SpaceGrotesk-SemiBold.ttf') format('truetype');
  font-weight: 600;
  font-style: normal;
  font-display: swap;
}
@font-face {
  font-family: 'Space Grotesk';
  src: url('../fonts/SpaceGrotesk-Bold.ttf') format('truetype');
  font-weight: 700;
  font-style: normal;
  font-display: swap;
}

/* ---------- COLOR TOKENS ---------- */

:root {
  /* — Core neutrals ———————————————————————————————— */
  --tp-ink:        #111115;   /* primary text, UI chrome, dark backgrounds */
  --tp-ink-soft:   #1A1A1E;   /* 2nd-level dark surface (cards on black)  */
  --tp-ink-line:   #161E24;   /* rare near-black, logo-inner detail       */
  --tp-beige:      #FFFFF5;   /* primary canvas / light surface           */
  --tp-beige-soft: #EBEBE1;   /* secondary beige for chips & filters      */
  --tp-white:      #FFFFFF;
  --tp-gray-stroke:#444444;   /* rule / divider grey                      */

  /* — Core brand accents (the "big four") ————————————— */
  --tp-blue:   #BBCAF0;       /* soft cornflower — primary accent */
  --tp-pink:   #F1C1F3;       /* pastel pink — high usage, CTA surfaces */
  --tp-green:  #ACCDB5;       /* pastel sage — system success vibe */
  --tp-orange: #F2B457;       /* warm amber — energetic highlight */

  /* — Accent color scales (each accent has 3 stops) ———— */
  --tp-pink-lightest:   #FDD9FD;
  --tp-pink-lighter:    #F7CDF8;
  --tp-pink-darker:     #E8A0EB;

  --tp-blue-lightest:   #D2E3FC;
  --tp-blue-lighter:    #C7D6F6;
  --tp-blue-darker:     #99ADE7;

  --tp-orange-lightest: #FFD28F;
  --tp-orange-lighter:  #FFC875;
  --tp-orange-darker:   #EA9435;

  --tp-green-lightest:  #C0E5CB;
  --tp-green-lighter:   #B6D9C0;
  --tp-green-darker:    #85B191;

  /* — Extra spot colors seen in the brand —————————————— */
  --tp-periwinkle:  #8FA1FF;  /* appears in photography gradient avatars */
  --tp-blue-soft:   #B6C9EF;  /* softer blue variant */

  /* — The Talkpush Gradient —————————————————————————————
     Green → Blue → Pink → Orange. Used sparingly as a
     graphic statement on dark/beige backgrounds. Never behind
     type; never on CTAs.                                     */
  --tp-gradient: linear-gradient(
    90deg,
    #ACCDB5 0%,
    #B6C9EF 28%,
    #F4C1F3 75%,
    #F2B457 100%
  );
  --tp-gradient-vertical: linear-gradient(
    180deg,
    #ACCDB6 0%,
    #B6C9EF 28%,
    #F4C1F3 75%,
    #F2B457 100%
  );

  /* — Semantic aliases ———————————————————————————————— */
  --bg-page:       var(--tp-beige);
  --bg-page-dark:  var(--tp-ink);
  --bg-card:       var(--tp-beige);
  --bg-card-dark:  var(--tp-ink-soft);
  --bg-chip:       var(--tp-beige-soft);
  --bg-chip-green: var(--tp-green);
  --bg-cta:        var(--tp-ink);
  --bg-cta-alt:    var(--tp-pink);
  --bg-cta-inv:    var(--tp-beige);

  --fg-default:    var(--tp-ink);
  --fg-onDark:     var(--tp-beige);
  --fg-muted:      rgba(17,17,21,0.6);
  --fg-muted-dark: rgba(255,255,245,0.6);
  --fg-faint-dark: rgba(255,255,245,0.4);

  --border-default: rgba(17,17,21,1);
  --border-soft:    rgba(17,17,21,0.2);
  --border-dark:    rgba(255,255,245,0.4);

  /* — Geometry ————————————————————————————————————————— */
  --radius-xs: 2px;    /* buttons, chips, pills — everything is SQUARED off */
  --radius-sm: 4px;    /* avatars-on-color, small tiles */
  --radius-md: 8px;    /* cards, form fields */
  --radius-lg: 16px;   /* large hero cards */
  --radius-xl: 40px;   /* full page framed containers */

  /* Spacing scale (modular 4pt) */
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 24px;
  --space-6: 32px;
  --space-7: 40px;
  --space-8: 56px;
  --space-9: 64px;
  --space-10: 96px;

  /* Elevation — restrained. Talkpush rarely uses shadows;
     it leans on 1px borders + flat color blocks. */
  --shadow-1: 0 1px 2px rgba(17,17,21,0.06);
  --shadow-2: 0 8px 24px -8px rgba(17,17,21,0.15);

  /* — Font stacks ————————————————————————————————————— */
  --font-display:  'Polymath Display', 'Polymath Demo', ui-serif, Georgia, serif;
  --font-text:     'Polymath Text', 'Polymath Text Demo',
                   ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif;
  --font-mono:     'Space Grotesk', ui-monospace, 'SF Mono', Menlo, monospace;
  --font-grotesk:  'Space Grotesk', ui-sans-serif, system-ui, sans-serif;

  /* — Type scale ————————————————————————————————————————
     Matches the hierarchy seen in the Fonts frame + hero layouts. */
  --fs-hero:     clamp(48px, 7vw, 118px);  /* Polymath Display, -0.03em */
  --fs-h1:       64px;                     /* Polymath Text, -0.04em  */
  --fs-h2:       44px;                     /* Space Grotesk uppercase headings */
  --fs-h3:       32px;                     /* card titles              */
  --fs-h4:       24px;                     /* section titles           */
  --fs-lg:       18px;                     /* lead copy                */
  --fs-body:     17px;                     /* default body             */
  --fs-md:       15px;
  --fs-sm:       13px;                     /* nav, metadata            */
  --fs-xs:       10px;                     /* bold micro-labels        */

  --lh-tight: 1.0;
  --lh-snug:  1.2;
  --lh-base:  1.4;
  --lh-loose: 1.6;
}

/* ---------- SEMANTIC TEXT STYLES ----------
   Use these classes (or the underlying tags) directly. */

html, body {
  font-family: var(--font-text);
  font-size: var(--fs-body);
  line-height: var(--lh-base);
  color: var(--fg-default);
  background: var(--bg-page);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

.tp-hero,
h1.tp-hero {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: var(--fs-hero);
  line-height: 0.95;
  letter-spacing: -0.03em;
  text-wrap: balance;
}

h1, .tp-h1 {
  font-family: var(--font-text);
  font-weight: 500;
  font-size: var(--fs-h1);
  line-height: 1.1;
  letter-spacing: -0.04em;
  text-wrap: balance;
}

h2, .tp-h2 {
  font-family: var(--font-grotesk);
  font-weight: 400;
  font-size: var(--fs-h2);
  line-height: 1;
  letter-spacing: 0.05em;
  text-transform: none;
}

/* Space Grotesk uppercase eyebrow — used for "PRIMARY HEADING", "BASE TEXT" */
.tp-eyebrow {
  font-family: var(--font-grotesk);
  font-size: var(--fs-sm);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--fg-default);
}

h3, .tp-h3 {
  font-family: var(--font-text);
  font-weight: 700;
  font-size: var(--fs-h3);
  line-height: 1.2;
  letter-spacing: -0.01em;
}

h4, .tp-h4 {
  font-family: var(--font-grotesk);
  font-weight: 500;
  font-size: var(--fs-h4);
  line-height: 1.4;
}

p, .tp-body {
  font-family: var(--font-text);
  font-weight: 500;
  font-size: var(--fs-body);
  line-height: var(--lh-base);
  color: var(--fg-default);
}

.tp-lead {
  font-family: var(--font-text);
  font-weight: 500;
  font-size: var(--fs-lg);
  line-height: var(--lh-base);
}

.tp-meta,
small {
  font-family: var(--font-grotesk);
  font-size: var(--fs-sm);
  line-height: var(--lh-base);
  color: var(--fg-default);
}

.tp-ui-label {
  font-family: var(--font-text);
  font-weight: 700;
  font-size: var(--fs-xs);
  letter-spacing: 0.01em;
  line-height: 1.4;
  text-transform: none;
}

code, .tp-code {
  font-family: var(--font-mono);
  font-size: 0.95em;
}
